<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAND CASINO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@400;700;900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #fde08b;
            min-height: 100vh;
            text-transform: uppercase;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
        }

        /* ФОН с золотым свечением */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vh;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, rgba(0,0,0,1) 50%);
            z-index: -3;
            pointer-events: none;
        }

        /* LUXURY BORDER */
        .luxury-border {
            border: 2px solid #d4af37;
            border-radius: 16px;
            background: linear-gradient(145deg, #111111, #000000);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), inset 0 0 20px rgba(212, 175, 55, 0.05);
        }

        /* MARQUEE FRAME (Лампочки) */
        .marquee-frame {
            position: relative;
            padding: 32px;
            background-color: #0a0a0a;
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1), inset 0 0 10px rgba(0,0,0,0.8);
            border: 2px solid #3a2800;
        }

        .marquee-frame::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 14px;
            border: 6px dotted #cfa74b;
            box-shadow: none;
            pointer-events: none;
            z-index: 10;
        }

        /* GLOWING TEXT */
        .text-glow {
            text-shadow: 0 0 5px rgba(255, 223, 115, 0.4);
            color: #FFDF73;
        }

        /* BUTTONS */
        .luxury-btn {
            background: linear-gradient(to bottom, #FFDF73, #D4AF37);
            color: #1a1a1a;
            border: 2px solid #FFFDD0;
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transition: all 0.2s;
            font-weight: 900;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .luxury-btn:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .luxury-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: none;
        }

        .luxury-btn:disabled {
            filter: grayscale(100%);
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* SLOT WINDOW */
        .slot-window {
            height: 96px;
            overflow: hidden;
            background: linear-gradient(to right, #e8e3d8, #fffdf7, #e8e3d8); /* Creamy cards color */
            color: #000000;
            position: relative;
            border-radius: 8px;
            border: 2px solid #8c6216;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .slot-window::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 25px 20px -20px rgba(0,0,0,0.9), inset 0 -25px 20px -20px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }

        .reel {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .symbol {
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        /* DECORATIONS (Cards & Dice) */
        .cards-decor {
            position: absolute;
            top: -40px;
            left: -50px;
            display: flex;
            z-index: 25;
            pointer-events: none;
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.8));
        }
        .card {
            width: 60px;
            height: 90px;
            background-color: #fdf5e6;
            border-radius: 6px;
            border: 1px solid #cfa74b;
            display: flex;
            flex-direction: column;
            padding: 4px;
            font-weight: 900;
            font-size: 1.1rem;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .card-red { color: #cc0000; }
        .card-black { color: #111; }
        .card:nth-child(1) { transform: rotate(-25deg) translateY(20px); }
        .card:nth-child(2) { transform: rotate(-10deg) translateY(5px); margin-left: -35px; }
        .card:nth-child(3) { transform: rotate(5deg) translateY(0px); margin-left: -35px; }
        .card:nth-child(4) { transform: rotate(20deg) translateY(10px); margin-left: -35px; }
        .card-suit { font-size: 1.8rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .dice-decor {
            position: absolute;
            bottom: -30px;
            right: -40px;
            display: flex;
            z-index: 25;
            pointer-events: none;
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.9));
        }
        .die {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFDF73, #b8860b);
            border-radius: 8px;
            border: 1px solid #8c6216;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 6px;
            gap: 2px;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.4), inset -2px -2px 5px rgba(0,0,0,0.3);
        }
        .die:nth-child(1) { transform: rotate(-15deg); z-index: 2; }
        .die:nth-child(2) { transform: rotate(25deg) translateY(-10px) translateX(-15px); z-index: 1; }
        .dot {
            width: 9px;
            height: 9px;
            background-color: #1a1a1a;
            border-radius: 50%;
            align-self: center;
            justify-self: center;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.8);
        }
        .die-1 .dot:nth-child(1) { grid-area: 1 / 1; }
        .die-1 .dot:nth-child(2) { grid-area: 2 / 1; }
        .die-1 .dot:nth-child(3) { grid-area: 3 / 1; }
        .die-1 .dot:nth-child(4) { grid-area: 1 / 3; }
        .die-1 .dot:nth-child(5) { grid-area: 2 / 3; }
        .die-1 .dot:nth-child(6) { grid-area: 3 / 3; }
        
        .die-2 .dot:nth-child(1) { grid-area: 1 / 1; }
        .die-2 .dot:nth-child(2) { grid-area: 3 / 1; }
        .die-2 .dot:nth-child(3) { grid-area: 2 / 2; }
        .die-2 .dot:nth-child(4) { grid-area: 1 / 3; }
        .die-2 .dot:nth-child(5) { grid-area: 3 / 3; }

        /* CHIPS */
        .chip {
            cursor: grab;
            transition: transform 0.2s;
        }
        .chip:active {
            cursor: grabbing;
        }
        .chip:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .chip-realistic {
            position: relative;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 3px 5px 10px rgba(0, 0, 0, 0.8), inset 0 0 4px rgba(255, 255, 255, 0.4);
            border: 2px solid #333;
            overflow: hidden;
        }

        .chip-realistic::before {
            content: '';
            position: absolute;
            top: 14%; left: 14%; right: 14%; bottom: 14%;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #333;
            z-index: 1;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .chip-realistic::after {
            content: '';
            position: absolute;
            top: 20%; left: 20%; right: 20%; bottom: 20%;
            border-radius: 50%;
            border: 1px dashed #666;
            z-index: 2;
        }

        .chip-realistic span {
            position: relative;
            z-index: 3;
            color: #000;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

        .chip-10 {
            background: repeating-conic-gradient(#111 0deg 22.5deg, #D4AF37 22.5deg 45deg);
        }
        .chip-50 {
            background: repeating-conic-gradient(#8c0000 0deg 22.5deg, #111 22.5deg 45deg);
        }
        .chip-100 {
            background: repeating-conic-gradient(#000 0deg 22.5deg, #ffffff 22.5deg 45deg);
        }

        .dropzone-active {
            background-color: rgba(212, 175, 55, 0.2) !important;
            border-color: #FFDF73 !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5) !important;
        }

        /* TABS */
        .tab-active {
            background: linear-gradient(to bottom, #1a1a1a, #000);
            color: #FFDF73;
            border: 2px solid #d4af37;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -5px 15px rgba(212, 175, 55, 0.1);
        }

        .tab-inactive {
            background-color: #0a0a0a;
            color: #666;
            border: 2px solid #333;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            transition: color 0.3s;
        }

        .tab-inactive:hover {
            color: #d4af37;
        }

        /* MODAL */
        .modal-bg {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }

        /* HISTORY TABLE */
        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }
        th {
            background-color: #111;
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
        }
        td {
            border-bottom: 1px solid #333;
            background-color: #0a0a0a;
            color: #fff;
        }
        tr:hover td {
            background-color: #1a1a1a;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
    </style>
</head>

<body class="p-4 sm:p-8 relative overflow-x-hidden">

    <div class="ambient-glow"></div>
    <div class="fixed inset-0 z-[-2] bg-[url('beautiful-casino-poker-gambling-banner-with-text-space_1017-54064.jpg')] bg-cover bg-center opacity-40"></div>
    <div class="fixed inset-0 z-[-1] bg-black/60"></div>

    <div class="max-w-5xl mx-auto space-y-8 relative z-10">
        <!-- HEADER -->
        <header class="luxury-border p-6 sm:p-8 flex flex-col sm:flex-row justify-between items-center gap-6">
            <div class="text-center sm:text-left">
                <h1 class="text-5xl font-black text-glow">GRAND CASINO</h1>
                <p id="quoteBox" class="text-sm mt-2 text-yellow-200 italic tracking-widest">
                    ...
                </p>
            </div>
            <div class="flex items-center gap-6 bg-black/50 p-4 rounded-2xl border border-yellow-700/50">
                <div class="text-right">
                    <p class="text-xs font-bold text-slate-400 tracking-widest">БАЛАНС</p>
                    <p class="text-4xl font-black text-yellow-400 text-glow">$<span id="balanceDisplay">1000</span></p>
                </div>
                <button id="depositBtn" class="luxury-btn py-3 px-8 text-xl">
                    КАССА
                </button>
            </div>
        </header>

        <!-- TABS -->
        <div class="flex gap-2 border-b-2 border-yellow-600">
            <button class="tab-btn tab-active font-bold text-xl py-3 px-8" data-target="gameView">АВТОМАТ</button>
            <button class="tab-btn tab-inactive font-bold text-xl py-3 px-8" data-target="historyView">ИСТОРИЯ</button>
        </div>

        <!-- VIEW 1: GAME -->
        <div id="gameView" class="view-section grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- SLOT MACHINE -->
            <div class="lg:col-span-2 marquee-frame flex flex-col items-center">
                <!-- CARDS DECORATION -->
                <div class="cards-decor hidden sm:flex">
                    <div class="card card-red"><span>A</span><span class="card-suit">♦</span></div>
                    <div class="card card-black"><span>A</span><span class="card-suit">♣</span></div>
                    <div class="card card-red"><span>A</span><span class="card-suit">♥</span></div>
                    <div class="card card-black"><span>A</span><span class="card-suit">♠</span></div>
                </div>
                <!-- DICE DECORATION -->
                <div class="dice-decor hidden sm:flex">
                    <div class="die die-1">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                    <div class="die die-2">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>

                <h2 class="text-3xl font-black mb-8 text-glow text-center">ИСПЫТАЙ УДАЧУ</h2>

                <div class="grid grid-cols-3 gap-4 sm:gap-6 w-full max-w-md mb-8 relative z-20">
                    <!-- Окно 1 -->
                    <div class="slot-window"><div class="reel" id="reel1"><div class="symbol"><i class="fa-solid fa-gem text-blue-400"></i></div></div></div>
                    <!-- Окно 2 -->
                    <div class="slot-window"><div class="reel" id="reel2"><div class="symbol"><i class="fa-solid fa-gem text-blue-400"></i></div></div></div>
                    <!-- Окно 3 -->
                    <div class="slot-window"><div class="reel" id="reel3"><div class="symbol"><i class="fa-solid fa-gem text-blue-400"></i></div></div></div>
                </div>

                <div class="flex gap-4 w-full max-w-md relative z-20">
                    <button id="spinBtn" class="luxury-btn flex-1 py-5 text-3xl tracking-widest">
                        КРУТИТЬ
                    </button>
                    <button id="autoSpinBtn" class="luxury-btn w-20 flex-shrink-0 flex items-center justify-center text-3xl transition-colors" title="Автоигра" style="background: linear-gradient(to bottom, #2a2a2a, #0a0a0a); color: #cfa74b; border-color: #8c6216;">
                        <i id="autoSpinStatusIcon" class="fa-solid fa-arrows-rotate"></i>
                    </button>
                </div>

                <div class="h-10 mt-4 relative z-20">
                    <p id="gameMessage" class="text-xl font-bold px-6 py-2 rounded-full hidden border border-yellow-500 bg-black/80 text-yellow-400"></p>
                </div>
            </div>

            <!-- BETTING AREA -->
            <div class="luxury-border p-6 flex flex-col">
                <h3 class="text-2xl font-black mb-6 text-center text-yellow-500 border-b border-yellow-800 pb-4">СТАВКА</h3>

                <!-- Drop Zone -->
                <div id="dropZone" class="flex-1 border-2 border-dashed border-yellow-600/50 rounded-2xl flex flex-col justify-center items-center p-6 mb-8 transition-all relative">
                    <p class="font-bold text-center text-yellow-700/80 mb-4 tracking-widest">МЕСТО ДЛЯ ФИШЕК</p>
                    <p class="text-5xl font-black text-glow mb-4">$<span id="currentBetDisplay">0</span></p>

                    <!-- КОНТЕЙНЕР ДЛЯ ФИШЕК НА СТОЛЕ -->
                    <div id="placedChipsContainer" class="flex flex-wrap justify-center gap-2 mt-2 z-10 min-h-[3rem]"></div>

                    <button id="clearBetBtn" class="mt-6 text-sm font-bold text-red-400 border border-red-900/50 px-4 py-2 rounded-full hover:bg-red-900/20 transition-colors">СБРОСИТЬ</button>
                </div>

                <!-- Chips -->
                <div>
                    <p class="font-bold mb-4 text-center text-yellow-700/80 tracking-widest">НОМИНАЛЫ</p>
                    <div class="flex justify-center gap-4 flex-wrap">
                        <div class="chip chip-realistic chip-10 w-16 h-16 text-xl" draggable="true" data-value="10"><span>10</span></div>
                        <div class="chip chip-realistic chip-50 w-16 h-16 text-xl" draggable="true" data-value="50"><span>50</span></div>
                        <div class="chip chip-realistic chip-100 w-16 h-16 text-xl" draggable="true" data-value="100"><span>100</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIEW 2: HISTORY -->
        <div id="historyView" class="view-section hidden luxury-border p-6 sm:p-8">
            <h2 class="text-3xl font-black mb-8 text-glow">БАЗА ДАННЫХ</h2>

            <!-- Панель управления -->
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <input type="text" id="searchInput" placeholder="Поиск..." class="w-full md:w-1/3 bg-black border border-yellow-700 rounded-lg text-yellow-100 px-4 py-3 focus:outline-none focus:border-yellow-400">
                <select id="filterSelect" class="w-full md:w-auto bg-black border border-yellow-700 rounded-lg text-yellow-100 px-4 py-3 focus:outline-none focus:border-yellow-400">
                    <option value="all">Все игры</option>
                    <option value="win">Победы</option>
                    <option value="lose">Проигрыши</option>
                </select>
                <select id="sortSelect" class="w-full md:w-auto bg-black border border-yellow-700 rounded-lg text-yellow-100 px-4 py-3 focus:outline-none focus:border-yellow-400">
                    <option value="dateDesc">Сначала новые</option>
                    <option value="dateAsc">Сначала старые</option>
                    <option value="amountDesc">По сумме ставки</option>
                </select>
            </div>

            <!-- Таблица -->
            <div class="overflow-x-auto rounded-xl border border-yellow-800/50">
                <table class="w-full text-left">
                    <thead>
                        <tr>
                            <th class="p-4 font-bold tracking-widest text-sm">ВРЕМЯ</th>
                            <th class="p-4 font-bold tracking-widest text-sm">СЛОТЫ</th>
                            <th class="p-4 font-bold tracking-widest text-sm">СТАВКА</th>
                            <th class="p-4 font-bold tracking-widest text-sm">СТАТУС</th>
                            <th class="p-4 font-bold tracking-widest text-sm">ИТОГ</th>
                            <th class="p-4 font-bold tracking-widest text-sm text-right">УДАЛИТЬ</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="font-medium text-sm">
                        <!-- Данные -->
                    </tbody>
                </table>
                <div id="emptyHistory" class="hidden text-center py-12 text-xl font-bold text-yellow-700/50">
                    ИСТОРИЯ ПУСТА
                </div>
            </div>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПОПОЛНЕНИЯ -->
    <div id="depositModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50 p-4">
        <div class="luxury-border w-full max-w-md p-8 transform transition-transform" id="modalContent">
            <h2 class="text-3xl font-black text-glow mb-8 text-center">ПОПОЛНЕНИЕ СЧЕТА</h2>
            <form id="depositForm">
                <label class="block text-yellow-500 font-bold mb-2 text-sm tracking-widest">СУММА ($):</label>
                <input type="number" id="depositInput" class="w-full bg-black border-2 border-yellow-600 rounded-xl text-yellow-400 px-6 py-4 mb-2 text-3xl font-black focus:outline-none focus:border-yellow-400 text-center" placeholder="100">
                <p id="depositError" class="text-red-400 text-sm font-bold mb-6 hidden text-center">ОШИБКА: НЕДОПУСТИМОЕ ЗНАЧЕНИЕ!</p>

                <div class="flex gap-4 mt-8">
                    <button type="button" id="closeModalBtn" class="flex-1 border border-yellow-700 text-yellow-500 rounded-full font-bold py-4 hover:bg-yellow-900/20 transition-colors">ОТМЕНА</button>
                    <button type="submit" class="luxury-btn flex-1 py-4">ВНЕСТИ</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
